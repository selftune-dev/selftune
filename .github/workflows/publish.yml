name: Publish

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions: {}

concurrency:
  group: publish-selftune
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Lint
        run: bun run lint

      - name: Architecture lint
        run: bun run lint:arch

      - name: Run tests
        run: bun test

  publish:
    if: github.ref == 'refs/heads/master'
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: bun install

      - name: Build dashboard SPA
        run: bun run build:dashboard

      - name: Verify npm version for trusted publishing
        run: npm --version

      - name: Check if publish is needed
        id: check
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          PUBLISHED=$(npm view selftune version 2>/dev/null || echo "0.0.0")
          if [ "$CURRENT" = "$PUBLISHED" ]; then
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
          else
            HIGHEST=$(printf '%s\n' "$PUBLISHED" "$CURRENT" | sort -V | tail -n1)
            if [ "$HIGHEST" = "$CURRENT" ]; then
              echo "should_publish=true" >> "$GITHUB_OUTPUT"
            else
              echo "should_publish=false" >> "$GITHUB_OUTPUT"
            fi
          fi
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"

      - name: Skip publish when version is already on npm
        if: steps.check.outputs.should_publish == 'false'
        run: |
          echo "Skipping publish: selftune@${{ steps.check.outputs.current }} already exists on npm."

      - name: Publish to npm
        if: steps.check.outputs.should_publish == 'true'
        id: publish
        run: npm publish --provenance --access public

      - name: Create GitHub Release
        if: steps.check.outputs.should_publish == 'true' && steps.publish.outcome == 'success'
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2
        with:
          tag_name: v${{ steps.check.outputs.current }}
          name: v${{ steps.check.outputs.current }}
          generate_release_notes: true
          make_latest: true
