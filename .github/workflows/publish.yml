name: Publish

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions: {}

concurrency:
  group: publish-selftune
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Architecture lint
        run: bun run lint:arch

      - name: Run tests
        run: bun test tests/ packages/telemetry-contract/

  publish:
    if: github.ref == 'refs/heads/main'
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.11

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build dashboard SPA
        run: bun run build:dashboard

      - name: Verify npm version for trusted publishing
        run: npm --version

      - name: Check if publish is needed
        id: check
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          PUBLISHED=$(npm view selftune version 2>/dev/null || echo "0.0.0")
          TAG="v$CURRENT"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            TAG_EXISTS=true
          else
            TAG_EXISTS=false
          fi

          SHOULD_PUBLISH=false
          SHOULD_RELEASE=false

          if [ "$CURRENT" = "$PUBLISHED" ]; then
            if [ "$TAG_EXISTS" = "false" ]; then
              SHOULD_RELEASE=true
            fi
          else
            HIGHEST=$(printf '%s\n' "$PUBLISHED" "$CURRENT" | sort -V | tail -n1)
            if [ "$HIGHEST" = "$CURRENT" ]; then
              SHOULD_PUBLISH=true
              SHOULD_RELEASE=true
            fi
          fi

          echo "should_publish=$SHOULD_PUBLISH" >> "$GITHUB_OUTPUT"
          echo "should_release=$SHOULD_RELEASE" >> "$GITHUB_OUTPUT"
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "tag_exists=$TAG_EXISTS" >> "$GITHUB_OUTPUT"

      - name: Skip publish when version is already on npm
        if: steps.check.outputs.should_publish == 'false' && steps.check.outputs.should_release == 'false'
        run: |
          echo "Skipping publish and release: selftune@${{ steps.check.outputs.current }} already exists on npm and v${{ steps.check.outputs.current }} already exists on GitHub."

      - name: Continue release repair when GitHub tag is missing
        if: steps.check.outputs.should_publish == 'false' && steps.check.outputs.should_release == 'true'
        run: |
          echo "Skipping npm publish: selftune@${{ steps.check.outputs.current }} already exists on npm, but v${{ steps.check.outputs.current }} is missing on GitHub. Continuing release repair."

      - name: Pack tarball
        if: steps.check.outputs.should_release == 'true'
        id: pack
        run: |
          TARBALL=$(node -p "const pkg=require('./package.json'); pkg.name.replace(/^@/,'').replace(/\\//g,'-') + '-' + pkg.version + '.tgz'")
          npm pack >/dev/null
          test -f "$TARBALL"
          echo "tarball=$TARBALL" >> "$GITHUB_OUTPUT"

      - name: Publish to npm
        if: steps.check.outputs.should_publish == 'true'
        id: publish
        run: npm publish "${{ steps.pack.outputs.tarball }}" --provenance --access public

      - name: Resolve previous tag
        if: steps.check.outputs.should_release == 'true' && (steps.check.outputs.should_publish != 'true' || steps.publish.outcome == 'success')
        id: previous-tag
        run: |
          PREVIOUS=$(git tag --list 'v*' --sort=-version:refname | head -n1)
          echo "tag=$PREVIOUS" >> "$GITHUB_OUTPUT"

      - name: Generate SBOM
        if: steps.check.outputs.should_release == 'true' && (steps.check.outputs.should_publish != 'true' || steps.publish.outcome == 'success')
        run: |
          TMPDIR=$(mktemp -d)
          trap 'rm -rf "$TMPDIR"' EXIT
          tar -xzf "${{ steps.pack.outputs.tarball }}" -C "$TMPDIR"
          cd "$TMPDIR/package"
          node -e "const fs=require('node:fs'); const pkg=JSON.parse(fs.readFileSync('package.json','utf8')); delete pkg.workspaces; fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');"
          npm install --package-lock-only --ignore-scripts --omit=dev >/dev/null
          npm sbom --sbom-format cyclonedx --package-lock-only --workspaces=false > "$GITHUB_WORKSPACE/sbom.cdx.json"

      - name: Attest build provenance
        if: steps.check.outputs.should_release == 'true' && (steps.check.outputs.should_publish != 'true' || steps.publish.outcome == 'success')
        uses: actions/attest-build-provenance@ef244123eb79f2f7a7e75d99086184180e6d0018 # v2
        with:
          subject-path: "${{ steps.pack.outputs.tarball }}"

      - name: Render release notes
        if: steps.check.outputs.should_release == 'true' && (steps.check.outputs.should_publish != 'true' || steps.publish.outcome == 'success')
        run: |
          ARGS=(
            --version "${{ steps.check.outputs.current }}"
            --output .github/release-body.md
          )
          if [ -n "${{ steps.previous-tag.outputs.tag }}" ]; then
            ARGS+=(--previous-tag "${{ steps.previous-tag.outputs.tag }}")
          fi
          bun run scripts/render-release-notes.ts "${ARGS[@]}"

      - name: Create GitHub Release
        if: steps.check.outputs.should_release == 'true' && (steps.check.outputs.should_publish != 'true' || steps.publish.outcome == 'success')
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v2
        with:
          tag_name: v${{ steps.check.outputs.current }}
          name: v${{ steps.check.outputs.current }}
          body_path: .github/release-body.md
          make_latest: true
          files: |
            ${{ steps.pack.outputs.tarball }}
            sbom.cdx.json
